<!DOCTYPE html>
<html lang="en">

<head>
    <title>Task Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
            <h1 class="text-xl font-bold text-blue-600">Task Manager</h1>

            <div class="space-x-4">
                {% if user.is_authenticated %}
                <a href="/create/" class="bg-blue-500 px-3 py-1 rounded">New Task</a>

                <form method="POST" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button class="bg-red-500 px-3 py-1 rounded">
                        Logout
                    </button>
                </form>

                {% else %}
                <a href="/accounts/login/" class="bg-green-500 px-3 py-1 rounded">Login</a>
                <a href="/register/" class="bg-blue-500 px-3 py-1 rounded">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
