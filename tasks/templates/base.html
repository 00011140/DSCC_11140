<!DOCTYPE html>
<html lang="en">

<head>
    <title>Task Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
            <h1 class="text-xl font-bold text-blue-600">Task Manager</h1>

            <div class="space-x-4">
                <a href="/" class="text-gray-600 hover:text-blue-600">Home</a>
                <a href="/create/" class="text-gray-600 hover:text-blue-600">Create Task</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
