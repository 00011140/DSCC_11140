{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Your Tasks</h2>

<div class="space-y-4">

    {% for task in tasks %}
    <div class="p-4 border rounded-lg flex justify-between items-center hover:bg-gray-50">

        <div>
            <h3 class="font-semibold">{{ task.title }}</h3>
            <p class="text-gray-500 text-sm">{{ task.description }}</p>
        </div>

        <div class="space-x-2">
            <a href="{% url 'task_detail' task.id %}"
                class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                View
            </a>

            <a href="{% url 'edit_task' task.id %}"
                class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">
                Edit
            </a>

            <form action="{% url 'delete_task' task.id %}" method="POST" class="inline">
                {% csrf_token %}
                <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                    Delete
                </button>
            </form>
        </div>

    </div>
    {% empty %}
    <p class="text-gray-500">No tasks yet.</p>
    {% endfor %}

</div>

{% endblock %}
