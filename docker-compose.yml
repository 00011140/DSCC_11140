version: "3.9"

services:
  web:
    build: .
    command: gunicorn myproject.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - webnet

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file: .env
    networks:
      - webnet

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:


volumes:
  postgres_data:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:
